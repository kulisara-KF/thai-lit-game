<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าเล่นเกมวรรณคดีไทย</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 20px; }
        .card { background: white; max-width: 400px; margin: 20px auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #cccccc; }
        .status-msg { font-size: 18px; font-weight: bold; margin-top: 15px; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
    </style>
</head>
<body>
    <div class="card" id="login-box">
        <h2>⚔️ วรรณคดีแฟนพันธุ์แท้</h2>
        <input type="text" id="player-name" placeholder="กรอกชื่อของคุณ..." required>
        <button onclick="joinGame()">เข้าสู่ห้องเกม</button>
    </div>

    <div class="card" id="game-box" style="display: none;">
        <h3>ผู้เล่น: <span id="my-name"></span></h3>
        <h2>คะแนนสะสม: <span id="my-score" style="color:#e67e22;">0</span></h2>
        <hr>
        <p id="question-title">รอครูเริ่มข้อสอบ...</p>
        
        <input type="text" id="answer-input" placeholder="พิมพ์ชื่อตัวละครที่นี่..." disabled>
        <button id="send-btn" onclick="submitAnswer()" disabled>ส่งคำตอบ</button>

        <div id="result-msg" class="status-msg"></div>
    </div>

    <script>
        const socket = io();
        let startTime = 0;

        function joinGame() {
            const name = document.getElementById('player-name').value.trim();
            if(name) {
                socket.emit('joinGame', { playerName: name });
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('game-box').style.display = 'block';
                document.getElementById('my-name').innerText = name;
            }
        }

        function submitAnswer() {
            const ans = document.getElementById('answer-input').value.trim();
            if(!ans) return;

            const timeUsed = Math.floor((Date.now() - startTime) / 1000);
            socket.emit('submitAnswer', { answer: ans, timeUsed: timeUsed });

            document.getElementById('answer-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('result-msg').innerText = "⏳ ส่งคำตอบแล้ว รอเฉลย...";
        }

        socket.on('loadQuestionPlayer', (data) => {
            document.getElementById('question-title').innerText = `ข้อที่ ${data.qIndex}: ดูภาพบนจอครู แล้วตอบคำถาม!`;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('result-msg').innerText = '';
            startTime = Date.now();
        });

        socket.on('answerResult', (data) => {
            const msgBox = document.getElementById('result-msg');
            document.getElementById('my-score').innerText = data.currentScore;

            if(data.correct) {
                msgBox.className = "status-msg correct";
                msgBox.innerText = `✅ ตอบถูกต้อง! (+${data.scoreGained} คะแนน)`;
            } else {
                msgBox.className = "status-msg wrong";
                msgBox.innerText = "❌ คำตอบยังไม่ถูกต้อง!";
            }
        });
    </script>
</body>
</html>
