<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าจอครู (Host Screen)</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; font-size: 20px; background: #16213e; padding: 15px 30px; border-radius: 10px; }
        .game-container { display: flex; justify-content: center; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
        .stage { position: relative; width: 350px; height: 350px; border: 4px solid #f1c40f; border-radius: 10px; overflow: hidden; }
        .stage img { width: 100%; height: 100%; object-fit: cover; }
        .grid-cover { position: absolute; top:0; left:0; width:100%; height:100%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 2px; }
        .tile { background: #e67e22; color: white; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .tile.open { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .sidebar { width: 300px; text-align: left; background: #0f3460; padding: 20px; border-radius: 10px; }
        .btn { background: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; }
        .btn:hover { background: #219150; }
        .leaderboard ol { padding-left: 20px; font-size: 18px; }
        .leaderboard li { margin-bottom: 8px; }
        .hint-text { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-size: 16px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>🏆 เกมทายภาพวรรณคดีไทย</div>
        <div>👥 ผู้เล่นในห้อง: <span id="player-count">0</span> คน</div>
        <div>ข้อที่: <span id="q-index">0</span>/<span id="q-total">0</span></div>
    </div>

    <div class="game-container">
        <div>
            <div class="stage">
                <img id="host-img" src="" alt="ภาพปริศนา">
                <div class="grid-cover" id="grid-box">
                    <div class="tile" onclick="revealTile(0)">1</div>
                    <div class="tile" onclick="revealTile(1)">2</div>
                    <div class="tile" onclick="revealTile(2)">3</div>
                    <div class="tile" onclick="revealTile(3)">4</div>
                    <div class="tile" onclick="revealTile(4)">5</div>
                    <div class="tile" onclick="revealTile(5)">6</div>
                    <div class="tile" onclick="revealTile(6)">7</div>
                    <div class="tile" onclick="revealTile(7)">8</div>
                    <div class="tile" onclick="revealTile(8)">9</div>
                </div>
            </div>
            <p>💡 คลิกที่แผ่นป้ายบนจอเพื่อเปิดภาพทีละช่อง</p>
            <div id="hint-box" class="hint-text"></div>
        </div>

        <div class="sidebar">
            <button class="btn" onclick="nextQuestion()">▶️ เริ่มข้อถัดไป</button>
            <button class="btn" style="background:#e74c3c;" onclick="showHint()">💡 แสดงคำใบ้</button>
            <hr>
            <h3>✅ ตอบถูกแล้ว: <span id="correct-count" style="color:#2ecc71;">0</span> คน</h3>
            <div class="leaderboard">
                <h3>🥇 Leaderboard (Top 5)</h3>
                <ol id="leaderboard-list">
                    <li>ยังไม่มีข้อมูล</li>
                </ol>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        function nextQuestion() {
            socket.emit('startNextQuestion');
            document.getElementById('hint-box').style.display = 'none';
        }

        function revealTile(index) {
            socket.emit('revealTile', index);
        }

        function showHint() {
            document.getElementById('hint-box').style.display = 'block';
        }

        socket.on('updatePlayerCount', (count) => {
            document.getElementById('player-count').innerText = count;
        });

        socket.on('loadQuestionHost', (data) => {
            document.getElementById('q-index').innerText = data.qIndex;
            document.getElementById('q-total').innerText = data.totalQ;
            document.getElementById('host-img').src = data.image;
            document.getElementById('correct-count').innerText = 0;
            document.getElementById('hint-box').innerText = "คำใบ้: " + data.hint;

            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => t.classList.remove('open'));
        });

        socket.on('tileRevealed', (index) => {
            const tiles = document.querySelectorAll('.tile');
            if(tiles[index]) tiles[index].classList.add('open');
        });

        socket.on('updateCorrectCount', (count) => {
            document.getElementById('correct-count').innerText = count;
        });

        socket.on('updateLeaderboard', (topPlayers) => {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = topPlayers.map(p => `<li>${p.name} - <b>${p.score}</b> คะแนน</li>`).join('');
        });
    </script>
</body>
</html>
