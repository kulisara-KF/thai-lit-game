<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าจอครู (Host Screen)</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; font-size: 20px; background: #16213e; padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; }
        .game-container { display: flex; justify-content: center; gap: 40px; }
        
        .stage { position: relative; width: 400px; height: 400px; border: 5px solid #f1c40f; border-radius: 10px; overflow: hidden; background: #000; }
        .stage img { width: 100%; height: 100%; object-fit: cover; }
        .grid-cover { position: absolute; top:0; left:0; width:100%; height:100%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 2px; }
        .tile { background: #e67e22; color: white; font-size: 30px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: transform 0.2s, opacity 0.5s; }
        .tile:active { transform: scale(0.95); }
        .tile.open { opacity: 0; pointer-events: none; }
        
        .sidebar { width: 320px; text-align: left; }
        .btn { border: none; padding: 15px 20px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-blue { background: #3498db; color: white; } .btn-blue:hover { background: #2980b9; }
        .btn-green { background: #2ecc71; color: white; } .btn-green:hover { background: #27ae60; }
        .btn-yellow { background: #f1c40f; color: #333; } .btn-yellow:hover { background: #f39c12; }
        
        .answer-display { display: none; font-size: 36px; font-weight: bold; color: #2ecc71; background: white; padding: 10px 20px; border-radius: 10px; margin-top: 15px; border: 4px solid #2ecc71; }
        .hint-text { background: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; font-size: 18px; display: none; }

        /* Modal Leaderboard Overlay */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #0f3460; padding: 40px; border-radius: 15px; width: 600px; text-align: center; border: 2px solid #e67e22; }
        .modal-content h2 { color: #f1c40f; font-size: 32px; margin-top: 0; }
        .leaderboard-list { list-style: none; padding: 0; font-size: 24px; text-align: left; }
        .leaderboard-list li { background: #16213e; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; }
        .close-btn { background: #e74c3c; color: white; border: none; padding: 10px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>🏆 เกมทายภาพวรรณคดีไทย</div>
        <div>👥 ผู้เล่น: <span id="player-count">0</span> คน</div>
        <div>✅ ตอบถูกแล้ว: <span id="correct-count" style="color:#2ecc71; font-weight:bold;">0</span> คน</div>
        <div>ข้อที่: <span id="q-index">0</span>/<span id="q-total">0</span></div>
    </div>

    <div class="game-container">
        <div>
            <div class="stage">
                <img id="host-img" src="" alt="">
                <div class="grid-cover" id="grid-box">
                    <div class="tile" onclick="revealTile(0)">1</div><div class="tile" onclick="revealTile(1)">2</div><div class="tile" onclick="revealTile(2)">3</div>
                    <div class="tile" onclick="revealTile(3)">4</div><div class="tile" onclick="revealTile(4)">5</div><div class="tile" onclick="revealTile(5)">6</div>
                    <div class="tile" onclick="revealTile(6)">7</div><div class="tile" onclick="revealTile(7)">8</div><div class="tile" onclick="revealTile(8)">9</div>
                </div>
            </div>
            <div id="final-answer" class="answer-display"></div>
            <div id="hint-box" class="hint-text"></div>
        </div>

        <div class="sidebar">
            <button class="btn btn-blue" onclick="nextQuestion()">▶️ 1. เริ่มคำถามถัดไป</button>
            <button class="btn btn-yellow" onclick="showHint()">💡 2. แสดงคำใบ้</button>
            <button class="btn btn-green" onclick="showAnswer()">🎉 3. เฉลยคำตอบ</button>
            <hr style="border-color: #555; margin: 20px 0;">
            <button class="btn" style="background:#8e44ad; color:white;" onclick="toggleLeaderboard(true)">🏆 แสดง Leaderboard</button>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="modal">
        <div class="modal-content">
            <h2>🏆 ตารางคะแนนผู้นำ (Top 10)</h2>
            <ul class="leaderboard-list" id="leaderboard-list">
                <li>รอเริ่มเกม...</li>
            </ul>
            <button class="close-btn" onclick="toggleLeaderboard(false)">กลับสู่หน้าคำถาม</button>
        </div>
    </div>

    <script>
        const socket = io();
        
        // --- ระบบเสียงประกอบ (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'pop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'success') {
                osc.type = 'sine';
                [400, 500, 600].forEach((freq, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                    o.start(audioCtx.currentTime + (i * 0.15)); o.stop(audioCtx.currentTime + 1);
                });
            }
        }

        function nextQuestion() {
            socket.emit('startNextQuestion');
            document.getElementById('hint-box').style.display = 'none';
            document.getElementById('final-answer').style.display = 'none';
        }

        function revealTile(index) {
            socket.emit('revealTile', index);
        }

        function showHint() { document.getElementById('hint-box').style.display = 'block'; }
        
        function showAnswer() { 
            socket.emit('showAnswer'); 
        }

        function toggleLeaderboard(show) {
            document.getElementById('leaderboard-modal').style.display = show ? 'flex' : 'none';
        }

        // --- Socket Events ---
        socket.on('updatePlayerCount', count => document.getElementById('player-count').innerText = count);
        socket.on('updateCorrectCount', count => document.getElementById('correct-count').innerText = count);

        socket.on('loadQuestionHost', data => {
            document.getElementById('q-index').innerText = data.qIndex;
            document.getElementById('q-total').innerText = data.totalQ;
            document.getElementById('host-img').src = data.image;
            document.getElementById('correct-count').innerText = 0;
            document.getElementById('hint-box').innerText = "คำใบ้: " + data.hint;
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('open'));
        });

        socket.on('tileRevealed', index => {
            const tiles = document.querySelectorAll('.tile');
            if(tiles[index]) {
                tiles[index].classList.add('open');
                playSound('pop'); // เล่นเสียงเปิดป้าย
            }
        });

        socket.on('answerRevealed', (answer) => {
            // เปิดป้ายทั้งหมด
            document.querySelectorAll('.tile').forEach(t => t.classList.add('open'));
            // แสดงเฉลย
            const ansBox = document.getElementById('final-answer');
            ansBox.innerText = `เฉลย: ${answer}`;
            ansBox.style.display = 'block';
            
            playSound('success'); // เล่นเสียงสำเร็จ
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); // เอฟเฟกต์พลุกระดาษ
        });

        socket.on('updateLeaderboard', topPlayers => {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = topPlayers.map((p, i) => 
                `<li><span><b>${i+1}.</b> ${p.name}</span> <span style="color:#f1c40f;">${p.score} pt</span></li>`
            ).join('');
        });
    </script>
</body>
</html>
