<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอโฮสต์ควบคุมเกม</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap');
        
        body { font-family: 'Kanit', sans-serif; background: #0b0f19; color: white; margin: 0; padding: 20px; }

        .school-header { background: linear-gradient(90deg, #1e1b4b, #4338ca, #1e1b4b); padding: 15px; border-radius: 16px; text-align: center; border: 2px solid #6366f1; box-shadow: 0 0 25px rgba(99, 102, 241, 0.4); margin-bottom: 20px; }
        .school-header h1 { margin: 0; font-size: 26px; color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
        .school-header h2 { margin: 5px 0 0 0; font-size: 20px; color: #e0e7ff; }

        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: #181e29; padding: 20px; border-radius: 20px; border: 1px solid #2a3447; }

        .timer-badge { font-size: 32px; font-weight: 800; color: #ef4444; background: #291415; padding: 8px 20px; border-radius: 30px; border: 2px solid #ef4444; display: inline-block; }

        .btn { background: #2563eb; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; margin-right: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .btn-add-time { background: #d97706; }
        .btn-reveal { background: #059669; }

        .tile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 360px; height: 360px; margin: 15px auto; position: relative; background: #000; border-radius: 12px; overflow: hidden; border: 3px solid #3b82f6; }
        .main-image { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .tile { background: #3b82f6; color: white; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; cursor: pointer; z-index: 2; transition: 0.3s; }
        .tile.open { opacity: 0; pointer-events: none; }

        .lb-title { text-align: center; font-size: 22px; color: #f59e0b; margin-top: 0; text-transform: uppercase; }
        .lb-list { display: flex; flex-direction: column; gap: 10px; }
        .lb-item { display: flex; align-items: center; justify-content: space-between; background: #222c3d; padding: 12px 16px; border-radius: 12px; border-left: 5px solid #475569; }
        
        .lb-item.rank-1 { background: linear-gradient(90deg, #451a03, #222c3d); border-left-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
        .lb-item.rank-2 { background: linear-gradient(90deg, #1e293b, #222c3d); border-left-color: #94a3b8; }
        .lb-item.rank-3 { background: linear-gradient(90deg, #361309, #222c3d); border-left-color: #d97706; }

        .lb-rank { font-weight: 800; font-size: 18px; width: 30px; }
        .lb-name { font-weight: 600; font-size: 18px; flex-grow: 1; text-align: left; margin-left: 10px; }
        .lb-score { font-weight: 800; font-size: 20px; color: #38bdf8; }
    </style>
</head>
<body>

    <div class="school-header">
        <h1>34 วัน จากวันสุนทรภู่สู่วันภาษาไทย</h1>
        <h2>โรงเรียนพระพุทธบาท "พลานุกูลวิทยา"</h2>
    </div>

    <div class="dashboard">
        <div class="card" style="text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="q-number" style="margin:0;">ข้อที่ - / -</h2>
                <div class="timer-badge">⏱️ <span id="timer-text">30</span>s</div>
                <div>ผู้เล่นทั้งหมด: <span id="player-count" style="color:#f59e0b; font-weight:bold;">0</span> คน</div>
            </div>

            <div style="margin-top: 15px;">
                <button class="btn" onclick="startNextQuestion()">▶️ เริ่มข้อถัดไป</button>
                <button class="btn btn-add-time" onclick="addTime(10)">➕ เพิ่มเวลา 10 วินาที</button>
                <button class="btn btn-reveal" onclick="showAnswer()">💡 เฉลยคำตอบ</button>
            </div>

            <div class="tile-grid" id="tile-grid">
                <img id="main-img" class="main-image" src="" alt="คำถาม">
            </div>
            
            <p id="hint-text" style="font-size: 18px; color: #cbd5e1; background: #0f172a; padding: 10px; border-radius: 8px;">คำใบ้: กด "เริ่มข้อถัดไป" เพื่อเริ่มเกม</p>
        </div>

        <div class="card">
            <h3 class="lb-title">🏆 ตารางคะแนนเรียลไทม์</h3>
            <div class="lb-list" id="leaderboard-list">
                <p style="text-align:center; color:#64748b;">รอผู้เล่นเข้าห้อง...</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        function startNextQuestion() {
            socket.emit('startNextQuestion');
        }

        function addTime(seconds) {
            socket.emit('addTime', seconds);
        }

        function showAnswer() {
            socket.emit('showAnswer');
        }

        function revealTile(index) {
            socket.emit('revealTile', index);
        }

        socket.on('timerUpdate', (time) => {
            document.getElementById('timer-text').innerText = time;
        });

        socket.on('loadQuestionHost', (data) => {
            document.getElementById('q-number').innerText = `ข้อที่ ${data.qIndex} / ${data.totalQ}`;
            document.getElementById('hint-text').innerText = `คำใบ้: ${data.hint}`;

            const grid = document.getElementById('tile-grid');
            grid.innerHTML = `<img id="main-img" class="main-image" src="${data.image}">`;
            for(let i = 0; i < 16; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.innerText = i + 1;
                tile.onclick = () => revealTile(i);
                grid.appendChild(tile);
            }
        });

        socket.on('tileRevealed', (tileIndex) => {
            const tile = document.getElementById(`tile-${tileIndex}`);
            if(tile) tile.classList.add('open');
        });

        socket.on('updatePlayerCount', (count) => {
            document.getElementById('player-count').innerText = count;
        });

        socket.on('updateLeaderboard', (players) => {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';

            if (players.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#64748b;">รอผู้เล่นเข้าห้อง...</p>';
                return;
            }

            players.forEach((p, i) => {
                let rankClass = '';
                let medal = `${i + 1}.`;
                if(i === 0) { rankClass = 'rank-1'; medal = '🥇'; }
                else if(i === 1) { rankClass = 'rank-2'; medal = '🥈'; }
                else if(i === 2) { rankClass = 'rank-3'; medal = '🥉'; }

                list.innerHTML += `
                    <div class="lb-item ${rankClass}">
                        <span class="lb-rank">${medal}</span>
                        <span class="lb-name">${p.name}</span>
                        <span class="lb-score">${p.score}</span>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
