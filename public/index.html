<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าเล่นเกมวรรณคดีไทย</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap');
        
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 15px; }
        
        .school-header { position: relative; background: linear-gradient(90deg, #1e1b4b, #4338ca, #1e1b4b); padding: 12px; border-radius: 14px; text-align: center; border: 2px solid #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); margin-bottom: 15px; }
        .school-header h1 { margin: 0; font-size: 18px; color: #facc15; }
        .school-header h2 { margin: 3px 0 0 0; font-size: 14px; color: #e0e7ff; }

        .audio-toggle-btn { position: absolute; right: 10px; top: 10px; background: rgba(255,255,255,0.1); border: 1px solid #6366f1; color: white; padding: 4px 10px; border-radius: 15px; cursor: pointer; font-family: 'Kanit'; font-size: 12px; }

        .card { background: #1e293b; max-width: 420px; margin: 0 auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        .waiting-box { text-align: center; padding: 20px 10px; }
        .waiting-avatar { font-size: 64px; margin-bottom: 10px; animation: bounce 1.5s infinite; }
        .waiting-pulse { font-size: 18px; color: #38bdf8; font-weight: 600; animation: blink 1.2s infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .player-bar { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; }
        .rank-badge { background: #f59e0b; color: #0f172a; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 16px; }

        .timer-box { font-size: 20px; font-weight: bold; color: #ef4444; margin: 5px 0; }

        input[type="text"] { width: 100%; padding: 14px; margin: 10px 0; font-size: 18px; border-radius: 10px; border: 2px solid #475569; background: #0f172a; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; padding: 16px; font-size: 20px; border-radius: 12px; margin-top: 10px; box-shadow: 0 4px 0 #1d4ed8; font-family: 'Kanit'; }
        button:disabled { background: #475569; box-shadow: none; cursor: not-allowed; }

        .box-container { display: flex; justify-content: center; gap: 4px; margin: 15px 0; flex-wrap: wrap;}
        .char-box { width: 32px; height: 42px; border: 2px solid #3b82f6; border-radius: 6px; font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; background: #0f172a; color: #38bdf8;}
        .char-box.filled { background: #1e3a8a; border-color: #60a5fa; color: white; }

        .result-screen { display: none; margin-top: 15px; padding: 15px; border-radius: 15px; }
        .result-screen.correct-bg { background: linear-gradient(135deg, #065f46, #047857); border: 2px solid #10b981; }
        .result-screen.wrong-bg { background: linear-gradient(135deg, #991b1b, #b91c1c); border: 2px solid #f87171; }
        .result-screen.reveal-bg { background: linear-gradient(135deg, #1e1b4b, #312e81); border: 2px solid #818cf8; }

        .score-anim { font-size: 42px; font-weight: 800; margin: 5px 0; }
        .effect-tag { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.4); margin-bottom: 10px; }
        .overtake-banner { background: #fbbf24; color: #78350f; padding: 10px; border-radius: 10px; font-weight: 800; font-size: 16px; margin-top: 10px; }

        /* PODIUM PLAYER */
        .podium-player-box { background: #0f172a; padding: 20px; border-radius: 20px; border: 2px solid #facc15; }
        .podium-stage-p { display: flex; justify-content: center; align-items: flex-end; gap: 10px; height: 200px; margin: 20px 0; }
        .step-p { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; border-radius: 12px 12px 0 0; padding: 10px 2px; }
        .step-p1 { height: 100%; background: #f59e0b; order: 2; color: #0f172a; }
        .step-p2 { height: 70%; background: #94a3b8; order: 1; color: #0f172a; }
        .step-p3 { height: 50%; background: #d97706; order: 3; color: white; }
    </style>
</head>
<body>

    <div class="school-header">
        <h1>34 วัน จากวันสุนทรภู่สู่วันภาษาไทย</h1>
        <h2>โรงเรียนพระพุทธบาท "พลานุกูลวิทยา"</h2>
        <button class="audio-toggle-btn" id="audio-btn-p" onclick="toggleAudio()">🔊 เสียง: เปิด</button>
    </div>

    <!-- 📌 LOBBY LOGIN -->
    <div class="card" id="login-box">
        <div style="font-size: 50px;">🎮</div>
        <h2>วรรณคดีแฟนพันธุ์แท้</h2>
        <input type="text" id="player-name" placeholder="กรอกชื่อของคุณ..." required>
        <button onclick="joinGame()">🚀 เข้าร่วมเกม</button>
    </div>

    <!-- 📌 WAITING ROOM -->
    <div class="card" id="waiting-box" style="display: none;">
        <div class="waiting-box">
            <div class="waiting-avatar">⚔️</div>
            <h2 style="margin: 5px 0; color: #facc15;">ยินดีต้อนรับ! <span id="lobby-player-name"></span></h2>
            <p class="waiting-pulse">กำลังรอคุณครูเปิดฉากการแข่งขัน...</p>
            <p style="font-size: 14px; color: #94a3b8; margin-top: 15px;">เตรียมตัวให้พร้อม ดูหน้าจอใหญ่เพื่อรออ่านคำใบ้!</p>
        </div>
    </div>

    <!-- 📌 GAME BOX -->
    <div class="card" id="game-box" style="display: none;">
        <div class="player-bar">
            <div>👤 <span id="my-name"></span></div>
            <div class="rank-badge" id="my-rank-badge">อันดับ -</div>
            <div>🏆 <span id="my-score" style="color:#f59e0b; font-weight:bold;">0</span> pt</div>
        </div>

        <div class="timer-box">⏱️ เหลือเวลา: <span id="player-timer">30</span> วินาที</div>
        <p id="question-title" style="font-size: 16px; color: #94a3b8;">รอครูเริ่มข้อสอบ...</p>
        
        <div class="box-container" id="char-boxes"></div>
        <input type="text" id="answer-input" placeholder="พิมพ์คำตอบที่นี่..." disabled oninput="updateBoxes()">
        <button id="send-btn" onclick="submitAnswer()" disabled>ส่งคำตอบ ⚡</button>

        <div id="result-card" class="result-screen">
            <div id="result-status" style="font-size: 22px; font-weight: bold;"></div>
            <div id="effect-tag" class="effect-tag"></div>
            <div id="score-gained" class="score-anim"></div>
            <div id="overtake-msg"></div>
        </div>
    </div>

    <!-- 📌 PODIUM SCREEN PLAYER -->
    <div class="card podium-player-box" id="podium-box-player" style="display: none;">
        <h2 style="color: #facc15; margin: 0;">🏆 สรุปผลการแข่งขัน 🏆</h2>
        <div class="podium-stage-p" id="podium-p-top3"></div>
        <div id="podium-p-rest"></div>
        <button onclick="location.reload()" style="margin-top: 15px;">🔄 เล่นใหม่อีกครั้ง</button>
    </div>

    <script>
        const socket = io();
        let startTime = 0;
        let soundEnabled = true;

        // 🎵 WEB AUDIO SYNTHESIZER FOR PLAYER
        const SoundFX = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playClick() {
                if (!soundEnabled) return;
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            },
            playCorrect() {
                if (!soundEnabled) return;
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, now + idx * 0.08);
                    gain.gain.linearRampToValueAtTime(0.25, now + idx * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.25);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            },
            playWrong() {
                if (!soundEnabled) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.35);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.35);
            },
            playCrit() {
                if (!soundEnabled) return;
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, now + idx * 0.05);
                    gain.gain.linearRampToValueAtTime(0.3, now + idx * 0.05 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.05 + 0.3);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + idx * 0.05);
                    osc.stop(now + idx * 0.05 + 0.3);
                });
            },
            playFanfare() {
                if (!soundEnabled) return;
                this.init();
                const now = this.ctx.currentTime;
                const melody = [
                    { f: 392.00, d: 0.15, t: 0 },
                    { f: 523.25, d: 0.15, t: 0.15 },
                    { f: 659.25, d: 0.15, t: 0.30 },
                    { f: 783.99, d: 0.40, t: 0.45 },
                    { f: 659.25, d: 0.15, t: 0.90 },
                    { f: 783.99, d: 0.60, t: 1.05 }
                ];
                melody.forEach(n => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = n.f;
                    gain.gain.setValueAtTime(0.3, now + n.t);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + n.t + n.d);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + n.t);
                    osc.stop(now + n.t + n.d);
                });
            }
        };

        function toggleAudio() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('audio-btn-p');
            btn.innerText = soundEnabled ? '🔊 เสียง: เปิด' : '🔇 เสียง: ปิด';
        }

        function joinGame() {
            SoundFX.playClick();
            const name = document.getElementById('player-name').value.trim();
            if(name) {
                socket.emit('joinGame', { playerName: name });
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('waiting-box').style.display = 'block';
                document.getElementById('lobby-player-name').innerText = name;
                document.getElementById('my-name').innerText = name;
            }
        }

        function updateBoxes() {
            const text = document.getElementById('answer-input').value.trim();
            const boxes = document.querySelectorAll('.char-box');
            const chars = Array.from(text);

            boxes.forEach((box, i) => {
                if(chars[i]) {
                    box.innerText = chars[i];
                    box.classList.add('filled');
                } else {
                    box.innerText = '';
                    box.classList.remove('filled');
                }
            });
        }

        function submitAnswer() {
            SoundFX.playClick();
            const ans = document.getElementById('answer-input').value.trim();
            if(!ans) return;

            const timeUsed = Math.floor((Date.now() - startTime) / 1000);
            socket.emit('submitAnswer', { answer: ans, timeUsed: timeUsed });

            document.getElementById('answer-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            
            const resCard = document.getElementById('result-card');
            resCard.style.display = 'block';
            resCard.className = 'result-screen';
            document.getElementById('result-status').innerText = "⏳ ส่งคำตอบแล้ว...";
            document.getElementById('effect-tag').innerText = "รอตรวจผลลัพธ์";
            document.getElementById('score-gained').innerText = "...";
            document.getElementById('overtake-msg').innerHTML = "";
        }

        socket.on('timerUpdate', (time) => {
            document.getElementById('player-timer').innerText = time;
        });

        socket.on('loadQuestionPlayer', (data) => {
            document.getElementById('waiting-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';

            document.getElementById('question-title').innerText = `ข้อที่ ${data.qIndex}: ดูภาพบนจอครู แล้วพิมพ์คำตอบ!`;
            const input = document.getElementById('answer-input');
            input.value = '';
            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('result-card').style.display = 'none';
            
            const container = document.getElementById('char-boxes');
            container.innerHTML = '';
            for(let i = 0; i < data.boxesCount; i++) {
                container.innerHTML += `<div class="char-box"></div>`;
            }

            startTime = Date.now();
        });

        socket.on('answerResult', (data) => {
            document.getElementById('my-score').innerText = data.currentScore;
            document.getElementById('my-rank-badge').innerText = `อันดับที่ ${data.rank}`;

            const resCard = document.getElementById('result-card');
            const statusBox = document.getElementById('result-status');
            const effectTag = document.getElementById('effect-tag');
            const scoreBox = document.getElementById('score-gained');
            const overtakeBox = document.getElementById('overtake-msg');

            resCard.style.display = 'block';
            effectTag.innerText = data.effect.text;
            effectTag.style.color = data.effect.color;

            if(data.correct) {
                resCard.className = "result-screen correct-bg";
                statusBox.innerText = "🎉 ตอบถูกต้อง!";
                scoreBox.innerText = `+${data.scoreGained} pt`;

                if (data.effect.type === 'crit' || data.effect.type === 'bonus') {
                    SoundFX.playCrit();
                } else {
                    SoundFX.playCorrect();
                }

                if (typeof confetti === 'function' && (data.effect.type === 'crit' || data.rank <= 3)) {
                    confetti({ particleCount: 80, spread: 60, origin: { y: 0.8 } });
                }
            } else {
                resCard.className = "result-screen wrong-bg";
                statusBox.innerText = "❌ ตอบไม่ถูกต้อง!";
                scoreBox.innerText = data.scoreGained < 0 ? `${data.scoreGained} pt` : `+0 pt`;
                SoundFX.playWrong();
            }

            if(data.rankUp > 0) {
                let msg = `🚀 พุ่งขึ้นมา +${data.rankUp} อันดับ!`;
                if(data.passedPlayer) {
                    msg = `⚡ คุณแซงคุณ "${data.passedPlayer}" ขึ้นมาแล้ว! (+${data.rankUp} อันดับ)`;
                }
                overtakeBox.innerHTML = `<div class="overtake-banner">${msg}</div>`;
            } else {
                overtakeBox.innerHTML = "";
            }
        });

        socket.on('answerRevealed', (data) => {
            document.getElementById('answer-input').disabled = true;
            document.getElementById('send-btn').disabled = true;

            const resCard = document.getElementById('result-card');
            resCard.style.display = 'block';
            resCard.className = 'result-screen reveal-bg';
            
            document.getElementById('result-status').innerHTML = `💡 เฉลยคำตอบ`;
            document.getElementById('effect-tag').innerText = `คำตอบที่ถูกต้องคือ`;
            document.getElementById('effect-tag').style.color = `#a7f3d0`;
            document.getElementById('score-gained').innerText = data.answerText;
            document.getElementById('score-gained').style.fontSize = "26px";
        });

        socket.on('gameEnded', (data) => {
            document.getElementById('game-box').style.display = 'none';
            document.getElementById('podium-box-player').style.display = 'block';

            SoundFX.playFanfare();

            const top5 = data.top5;
            const p1 = top5[0] || { name: '-', score: 0 };
            const p2 = top5[1] || { name: '-', score: 0 };
            const p3 = top5[2] || { name: '-', score: 0 };

            document.getElementById('podium-p-top3').innerHTML = `
                <div class="step-p step-p2">
                    <div style="font-size:12px;"><b>${p2.name}</b></div>
                    <div>🥈</div>
                </div>
                <div class="step-p step-p1">
                    <div style="font-size:14px;">👑 <b>${p1.name}</b></div>
                    <div>🥇</div>
                </div>
                <div class="step-p step-p3">
                    <div style="font-size:12px;"><b>${p3.name}</b></div>
                    <div>🥉</div>
                </div>
            `;

            let restHTML = '<div style="margin-top:15px; text-align:left;">';
            if(top5[3]) restHTML += `<div style="padding:6px; background:#1e293b; border-radius:8px; margin-bottom:5px;">4️⃣ ${top5[3].name} (${top5[3].score} pt)</div>`;
            if(top5[4]) restHTML += `<div style="padding:6px; background:#1e293b; border-radius:8px;">5️⃣ ${top5[4].name} (${top5[4].score} pt)</div>`;
            restHTML += '</div>';
            document.getElementById('podium-p-rest').innerHTML = restHTML;

            if (typeof confetti === 'function') {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
            }
        });
    </script>
</body>
</html>
